<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-container">
      <div class="extensions-container">
        <div class="extensions-container-left">
          <img src="assets/images/logo_white_text.svg" alt="" />
        </div>

        <div class="extensions-container-right">
          <button class="mode-toggle">
            <img src="assets/images/icon-sun.svg" alt="" />
          </button>
        </div>
      </div>

      <div class="extensions-list-tab">
        <div class="extensions-list-tab-left">
          <h2>Extension List</h2>
        </div>

        <div class="extensions-list-tab-right">
          <div class="extensions-list-tab-right-buttons">
            <button class="extension-list-buttons" id="allButton">All</button>
            <button class="extension-list-buttons" id="activeButton">
              Active
            </button>
            <button class="extension-list-buttons" id="inactiveButton">
              Inactive
            </button>
          </div>
        </div>
      </div>

      <div class="extensions-display">
        <div class="extension-card">
          <div id="devLens">
            <div class="dev-lens-info">
              <div class="dev-lens-info-left">
                <img
                  src="assets/images/logo-devlens.svg"
                  alt="Dev Lens Logo"
                  class="devLensInfoImage"
                />
              </div>

              <div class="dev-lens-info-right">
                <div class="dev-lens-info-title">
                  <h4>DevLens</h4>
                </div>

                <p class="dev-lens-info-desc">
                  Quickly inspect page layouts and visualize element boundaries.
                </p>
              </div>
            </div>

            <div class="devLensButtons">
              <button class="common-button">Remove</button>
            </div>
          </div>
        </div>

        <div class="extension-card"></div>
        <div class="extension-card"></div>
        <div class="extension-card"></div>
        <div class="extension-card"></div>
        <div class="extension-card"></div>
        <div class="extension-card"></div>
        <div class="extension-card"></div>
        <div class="extension-card"></div>
        <div class="extension-card"></div>
        <div class="extension-card"></div>
        <div class="extension-card"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
